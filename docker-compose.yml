version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: fitsync_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: fitsync

  redis:
    image: redis:7-alpine
    container_name: fitsync_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: fitsync_api
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/fitsync
      REDIS_URL: redis://redis:6379
      JWT_SECRET: fitsync_secret_key
    depends_on:
      - mongo
      - redis

volumes:
  mongo_data:
